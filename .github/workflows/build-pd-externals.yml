name: Build PD Externals

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            artifact_ext: pd_darwin
          - os: ubuntu-latest
            artifact_ext: pd_linux
          - os: windows-latest
            artifact_ext: dll

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Baixar headers do PD (source no GitHub)
        if: runner.os != 'Windows'
        run: |
          curl -L https://github.com/pure-data/pure-data/archive/refs/tags/0.56-2.tar.gz -o /tmp/pd.tar.gz
          mkdir -p /tmp/pd-src
          tar -xzf /tmp/pd.tar.gz -C /tmp/pd-src --strip-components=1
          mkdir -p /tmp/pd/src
          cp /tmp/pd-src/src/*.h /tmp/pd/src/

      - name: Baixar PD completo (Windows — precisa de pd.dll para linkar)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          # msp.ucsd.edu tem cert problemático — SkipCertificateCheck contorna isso
          Invoke-WebRequest -SkipCertificateCheck `
            -Uri "https://msp.ucsd.edu/Software/pd-0.56-2.msw.zip" `
            -OutFile "C:\pd-msw.zip"
          Expand-Archive -Path "C:\pd-msw.zip" -DestinationPath "C:\pd-extract"
          $pdDir = Get-ChildItem "C:\pd-extract" -Directory | Select-Object -First 1
          New-Item -ItemType Directory -Force -Path "C:\pd\src"
          New-Item -ItemType Directory -Force -Path "C:\pd\bin"
          Copy-Item "$($pdDir.FullName)\src\*.h"   "C:\pd\src\"
          Copy-Item "$($pdDir.FullName)\bin\pd.dll" "C:\pd\bin\"

      - name: Compilar externals (macOS/Linux)
        if: runner.os != 'Windows'
        working-directory: Pure Data/pd-externals
        run: make PDINCLUDEDIR=/tmp/pd/src

      - name: Compilar externals (Windows)
        if: runner.os == 'Windows'
        working-directory: Pure Data/pd-externals
        shell: cmd
        run: make PDINCLUDEDIR="C:/pd/src" PDDIR="C:/pd"

      - name: Coletar artefatos (macOS/Linux)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          cp "Pure Data/pd-externals/"*.pd_darwin dist/ 2>/dev/null || true
          cp "Pure Data/pd-externals/"*.pd_linux  dist/ 2>/dev/null || true
          cp "Pure Data/pd-externals/"*-help.pd   dist/

      - name: Coletar artefatos (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist
          Copy-Item "Pure Data\pd-externals\*.dll"     dist\ -ErrorAction SilentlyContinue
          Copy-Item "Pure Data\pd-externals\*-help.pd" dist\

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: giromin-externals-${{ matrix.artifact_ext }}
          path: dist/

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download todos os artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/

      - name: Criar zips por plataforma
        run: |
          cd dist
          for dir in */; do
            zip -r "../${dir%/}.zip" "$dir"
          done

      - name: Criar Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Giromin PD Externals ${{ github.ref_name }}"
          body: |
            ## Externals do Giromin para Pure Data / PlugData

            Instale copiando os arquivos para:
            - **macOS**: `~/Documents/PlugData/Externals/Giromin/`
            - **Linux**: `~/.local/lib/pd/`
            - **Windows**: `%AppData%\Pd\` ou pasta de externals do PlugData

            Depois adicione o caminho em **Settings → Paths** e reinicie.

            ### Objetos incluídos
            - `giromin.angulos` — converte quaternion para ângulos de Euler
            - `giromin.suavizar` — filtro EMA assimétrico (rise/fall)
            - `giromin.map` — remapeia valores entre faixas
            - `giromin.centro` — detecta centro de oscilação
            - `giromin.pico` — detecta picos com debounce
            - `giromin.fusao` — fusão de sensores (Madgwick)
          files: |
            giromin-externals-pd_darwin.zip
            giromin-externals-pd_linux.zip
            giromin-externals-dll.zip
